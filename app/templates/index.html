<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tebei — text-image retrieval</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <img class="logo" src="/public/tebei-logo.png" alt="tebei" />
      <p class="subtitle">text-image retrieval</p>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="text">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Text Search
      </button>
      <button class="tab" data-tab="image">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Image Search
      </button>
      <button class="tab" data-tab="upload">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload
      </button>
    </div>

    <!-- ── Panel: Text Search ── -->
    <div id="panel-text" class="panel active">
      <div class="search-wrap">
        <div class="search-bar">
          <input id="text-query" type="text" placeholder="Search images by description..." autocomplete="off" />
          <button id="text-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
            Search
          </button>
        </div>
        <div id="autocomplete-list" class="autocomplete-list hidden"></div>
      </div>
      <div id="suggestions" class="suggestions"></div>
    </div>

    <!-- ── Panel: Image Search ── -->
    <div id="panel-image" class="panel">
      <div class="drop-zone" id="search-drop">
        <button id="search-clear" class="drop-clear hidden">&times;</button>
        <img id="search-preview" class="drop-preview hidden" alt="preview" />
        <div id="search-placeholder" class="drop-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <p>Drop an image here or <span class="link">click to browse</span></p>
          <p class="hint">JPG, PNG, WEBP supported</p>
        </div>
        <input type="file" id="search-file" accept="image/*" class="file-input" />
      </div>
      <div class="panel-actions">
        <button id="image-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
          Find Similar
        </button>
      </div>
    </div>

    <!-- ── Panel: Upload ── -->
    <div id="panel-upload" class="panel">
      <div class="drop-zone" id="upload-drop">
        <button id="upload-clear" class="drop-clear hidden">&times;</button>
        <img id="upload-preview" class="drop-preview hidden" alt="preview" />
        <div id="upload-placeholder" class="drop-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>Drop an image here or <span class="link">click to browse</span></p>
          <p class="hint">JPG, PNG, WEBP supported</p>
        </div>
        <input type="file" id="upload-file" accept="image/*" class="file-input" />
      </div>
      <div class="caption-wrap">
        <label for="upload-caption">Caption / Description</label>
        <textarea id="upload-caption" rows="2" placeholder="Describe the image content..."></textarea>
      </div>
      <div class="panel-actions">
        <button id="upload-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Image
        </button>
      </div>
    </div>

    <!-- Loading spinner -->
    <div id="spinner" class="spinner hidden">
      <div class="spinner-ring"></div>
      <p class="spinner-text">Searching...</p>
    </div>

    <!-- Status -->
    <div id="status" class="status hidden"></div>

    <!-- Results meta -->
    <div id="results-meta" class="results-meta hidden">
      <span id="results-count"></span> results for "<em id="results-query"></em>"
      <span id="results-time" class="results-time"></span>
    </div>

    <!-- Related searches -->
    <div id="related-searches" class="related-searches hidden">
      <span class="related-label">Related:</span>
      <div id="related-chips" class="related-chips"></div>
    </div>

    <!-- Grid -->
    <div id="grid" class="grid"></div>

    <!-- Load more -->
    <div id="load-more-wrap" class="load-more-wrap hidden">
      <button id="load-more-btn">Load more results</button>
    </div>

    <!-- Image modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <img id="modal-img" alt="" />
        <p id="modal-caption"></p>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
    </div>

  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
