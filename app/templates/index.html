<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tebei — text-image retrieval</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <img class="logo" src="/public/tebei-logo.png" alt="tebei logo" />
      <p class="subtitle">text-image retrieval</p>
    </header>

    <div class="search-bar">
      <input id="query" type="text" placeholder="Search images by description..." autocomplete="off" />
      <button id="search-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        Search
      </button>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="results-meta" class="results-meta hidden">
      <span id="results-count"></span> results for "<em id="results-query"></em>"
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
